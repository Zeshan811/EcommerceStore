<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <h1>Inventory Management</h1>

    <form id="productForm">

        <input type="text" id="name" placeholder="Product Name" required>

        <input type="number" id="price" placeholder="Price" min="0.01" step="0.01" required>

        <select id="category" required>
            <option value="">Select Category</option>
            <option value="Laptop">Clothing</option>
            <option value="Mobile">Home</option>
            <option value="Accessories">Grocery</option>
        </select>

        <input type="number" id="stock" placeholder="Stock Quantity" min="1" required>

        <input type="text" id="image" placeholder="Image URL" required>

        <button type="submit">Add Product</button>

    </form>

    <table id="inventoryTable">

        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Stock</th>
                <th>Image</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

    <script src="admin.js"></script>

</body>

</html>
